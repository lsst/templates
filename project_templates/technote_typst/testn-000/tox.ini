[tox]
environments = lint
isolated_build = True

[testenv]
skip_install = true
deps =
    -rrequirements.txt

[testenv:lint]
deps = pre-commit
commands =
   pre-commit run --all-files

[testenv:add-author]
commands =
   documenteer technote add-author

[testenv:sync-authors]
commands =
   documenteer technote sync-authors
