name: "Change-controlled doc (lsstdoc LaTeX)"
group: "Documents"
dialog_title: "New lsstdoc LaTeX doc"
dialog_fields:
  - key: "title"
    label: "Document title"
    placeholder: ""
    hint: "Don't include the handle."
    component: "textarea"
  - label: "Document series"
    hint: "Choose the series for this document."
    component: "select"
    preset_options:
      - label: "RDO (Operations)"
        value: "RDO"
        presets:
          series: "RDO"
          github_org: "lsst"
          lsstdoc_org: "RDO"
      - label: "LDM (Data Management)"
        value: "LDM"
        presets:
          series: "LDM"
          github_org: "lsst"
          lsstdoc_org: "DM"
      - label: "LSE (Systems Engineering)"
        value: "LSE"
        presets:
          series: "LSE"
          github_org: "lsst"
          lsstdoc_org: "SE"
  - key: "serial_number"
    label: "Serial number"
    hint: "The suffix after the series name, as assigned by DocuShare. Use a technote template for technote handles."
    placeholder: "e.g.: '151' for LDM-151"
    component: "text"
  - key: "author_id"
    label: "First author's ID"
    hint: "ID is a key from lsst-texmf's authordb.yaml (http://ls.st/uyr)"
    component: "text"
    placeholder: ""
